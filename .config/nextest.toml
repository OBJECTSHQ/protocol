# Nextest configuration for OBJECTS Protocol
#
# QUIC network tests must run serially to avoid UDP port contention.
# Same pattern used by n0/iroh for their test suite.
# See: https://nexte.st/docs/configuration/test-groups/

[profile.default]
slow-timeout = { period = "60s", terminate-after = 3 }

[test-groups.quic-network]
max-threads = 1

# Multi-node sync tests: create endpoint pairs, transfer blobs/docs
[[profile.default.overrides]]
filter = 'binary(multi_node_sync)'
test-group = 'quic-network'

# Transport integration tests: raw QUIC connections between endpoints
[[profile.default.overrides]]
filter = 'binary(integration_test) & package(objects-transport)'
test-group = 'quic-network'
