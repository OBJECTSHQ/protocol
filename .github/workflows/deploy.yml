name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'bins/**'
      - 'docker/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (defaults to git SHA)'
        required: false
        type: string

env:
  PROJECT_ID: objects-devnet
  REGISTRY: us-central1-docker.pkg.dev/objects-devnet/objects

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Determine image tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.image_tag }}
          GIT_SHA: ${{ github.sha }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$GIT_SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push objects-registry image
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          docker build \
            -f docker/registry.Dockerfile \
            -t "${REGISTRY}/objects-registry:${IMAGE_TAG}" \
            -t "${REGISTRY}/objects-registry:latest" \
            .
          docker push "${REGISTRY}/objects-registry:${IMAGE_TAG}"
          docker push "${REGISTRY}/objects-registry:latest"

      - name: Build and push objects-node image
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          docker build \
            -f docker/node.Dockerfile \
            -t "${REGISTRY}/objects-node:${IMAGE_TAG}" \
            -t "${REGISTRY}/objects-node:latest" \
            .
          docker push "${REGISTRY}/objects-node:${IMAGE_TAG}"
          docker push "${REGISTRY}/objects-node:latest"

  deploy-registry:
    name: Deploy Registry
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy registry
        env:
          AR_REGISTRY: ${{ env.REGISTRY }}
        run: |
          gcloud compute ssh objects-registry \
            --zone=us-central1-a \
            --project="${PROJECT_ID}" \
            --command="
              docker pull ${AR_REGISTRY}/objects-registry:latest
              docker stop objects-registry 2>/dev/null || true
              docker rm objects-registry 2>/dev/null || true
              docker run -d \
                --name objects-registry \
                --restart unless-stopped \
                -p 8080:8080 \
                -e DATABASE_URL \
                -e RUST_LOG \
                ${AR_REGISTRY}/objects-registry:latest
            "

      - name: Health check
        run: |
          gcloud compute ssh objects-registry \
            --zone=us-central1-a \
            --project="${PROJECT_ID}" \
            --command='
              for i in $(seq 1 30); do
                if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
                  echo "Registry healthy"
                  exit 0
                fi
                echo "Waiting for registry... ($i/30)"
                sleep 2
              done
              echo "Registry health check failed"
              exit 1
            '

  deploy-nodes:
    name: Deploy ${{ matrix.name }}
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        include:
          - name: objects-bootstrap-us
            zone: us-central1-a
          - name: objects-bootstrap-asia
            zone: asia-northeast1-a
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy node
        env:
          VM_NAME: ${{ matrix.name }}
          VM_ZONE: ${{ matrix.zone }}
          AR_REGISTRY: ${{ env.REGISTRY }}
        run: |
          gcloud compute ssh "${VM_NAME}" \
            --zone="${VM_ZONE}" \
            --project="${PROJECT_ID}" \
            --command="
              docker pull ${AR_REGISTRY}/objects-node:latest
              docker stop objects-node 2>/dev/null || true
              docker rm objects-node 2>/dev/null || true
              docker run -d \
                --name objects-node \
                --restart unless-stopped \
                -p 3420:3420 \
                -p 7824:7824/udp \
                -v objects-data:/data \
                -e OBJECTS_API_BIND \
                -e OBJECTS_QUIC_PORT \
                -e OBJECTS_RELAY_URL \
                -e OBJECTS_REGISTRY_URL \
                -e RUST_LOG \
                ${AR_REGISTRY}/objects-node:latest
            "

      - name: Health check
        env:
          VM_NAME: ${{ matrix.name }}
          VM_ZONE: ${{ matrix.zone }}
        run: |
          gcloud compute ssh "${VM_NAME}" \
            --zone="${VM_ZONE}" \
            --project="${PROJECT_ID}" \
            --command='
              for i in $(seq 1 30); do
                if curl -sf http://localhost:3420/health > /dev/null 2>&1; then
                  echo "Node healthy"
                  exit 0
                fi
                echo "Waiting for node... ($i/30)"
                sleep 2
              done
              echo "Node health check failed"
              exit 1
            '
